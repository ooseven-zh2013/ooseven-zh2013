name: Metrics
on:
  schedule:
    # 每天北京时间08:00（UTC 00:00）自动运行
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ===== 主要统计卡片 =====
      - name: Generate general stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ooseven-zh2013
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai
          config_order: base.header, base.activity+community, base.repositories
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: commit
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 7
          plugin_habits_facts: yes
          plugin_habits_from: 100
          plugin_habits_languages_limit: 4
          plugin_habits_languages_threshold: 0%
          filename: svg/overview.svg

      # ===== 等距贡献日历 =====
      - name: Generate isometric calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ooseven-zh2013
          template: classic
          base: ""
          config_timezone: Asia/Shanghai
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          filename: svg/contributions.svg

      # ===== 常用语言 =====
      - name: Generate languages stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ooseven-zh2013
          template: classic
          base: ""
          config_timezone: Asia/Shanghai
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          filename: svg/languages.svg

      # ===== 追番/阅读列表 (AniList) — 已禁用：未绑定 AniList 账号 =====
      # 如需启用，请将 plugin_anilist_user 改为你的 AniList 用户名
      # - name: Generate AniList stats
      #   uses: lowlighter/metrics@latest
      #   with:
      #     token: ${{ secrets.METRICS_TOKEN }}
      #     user: ooseven-zh2013
      #     template: classic
      #     base: ""
      #     config_timezone: Asia/Shanghai
